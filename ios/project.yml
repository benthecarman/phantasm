name: Phantasm
options:
  bundleIdPrefix: com.phantasm
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  PhantasmKit:
    path: Packages/PhantasmKit
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.0.0"
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  GRDBQuery:
    url: https://github.com/groue/GRDBQuery
    from: "0.11.0"
targets:
  Phantasm:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: App
      - path: Views
      - path: ViewModels
    dependencies:
      - package: PhantasmKit
      - package: MarkdownUI
        product: MarkdownUI
      - package: GRDB
        product: GRDB
      - package: GRDBQuery
        product: GRDBQuery
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Phantasm
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        NSPhotoLibraryAddUsageDescription: "Phantasm saves generated images to your photo library when you choose to save them."
        NSPhotoLibraryUsageDescription: "Phantasm lets you choose photos from your library to attach to a message."
        NSCameraUsageDescription: "Phantasm uses the camera so you can take a photo to attach to a message."
        NSMicrophoneUsageDescription: "Phantasm uses the microphone so you can dictate messages. Audio is transcribed on-device and never leaves your phone."
        NSSpeechRecognitionUsageDescription: "Phantasm uses speech recognition to transcribe your dictation. On supported devices this runs entirely on-device."
        NSLocationWhenInUseUsageDescription: "Phantasm shares your current location with the AI model only when you turn on the Location tool for a chat and the model asks for it."
        NSHealthShareUsageDescription: "Phantasm shares your Apple Health data with the AI model only when you turn on the Health tool for a chat and the model asks for it. Access is read-only."
        NSHealthUpdateUsageDescription: "Phantasm does not write to Apple Health."
        NSCalendarsFullAccessUsageDescription: "Phantasm shares calendar events with the AI model only when you turn on the Calendar tool for a chat. Event creation also requires your confirmation before anything is added."
        NSCalendarsWriteOnlyAccessUsageDescription: "Phantasm can add calendar events only when you turn on the Calendar tool for a chat and confirm the event details."
        NSCalendarsUsageDescription: "Phantasm shares calendar events with the AI model only when you turn on the Calendar tool for a chat. Event creation also requires your confirmation before anything is added."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: App/Phantasm.entitlements
      properties:
        com.apple.developer.healthkit: true
    preBuildScripts:
      - name: Warn when SSH keychain blocks signing
        basedOnDependencyAnalysis: false
        script: |
          if [[ -z "${SSH_CONNECTION:-}${SSH_TTY:-}" ]]; then
            exit 0
          fi
          if [[ "${SDK_NAME:-}" != iphoneos* ]]; then
            exit 0
          fi
          if [[ "${CODE_SIGNING_ALLOWED:-YES}" == "NO" ]]; then
            exit 0
          fi

          identity="${EXPANDED_CODE_SIGN_IDENTITY:-}"
          if [[ -z "$identity" ]]; then
            identity="$(security find-identity -v -p codesigning | awk '/Apple Development/ {print $2; exit}')"
          fi
          if [[ -z "$identity" ]]; then
            echo "warning: SSH iOS build has no Apple Development signing identity available." >&2
            exit 0
          fi

          probe_dir="$(mktemp -d)"
          trap 'rm -rf "$probe_dir"' EXIT
          probe="$probe_dir/codesign-probe.sh"
          printf '#!/bin/sh\nexit 0\n' > "$probe"
          chmod +x "$probe"

          if ! /usr/bin/codesign --force --sign "$identity" --timestamp=none "$probe" >/dev/null 2>&1; then
            cat >&2 <<'EOF'
          error: SSH iOS build cannot access the Apple Development signing key.
          error: Unlock the login keychain in this SSH session, then rerun the build:
          error:   security unlock-keychain -p '<your-mac-login-password>' ~/Library/Keychains/login.keychain-db
          error:
          error: If this keeps happening, grant codesign persistent access once:
          error:   security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k '<your-mac-login-password>' ~/Library/Keychains/login.keychain-db
          EOF
            exit 1
          fi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.phantasm.app
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_TEAM: "6JWFWV65BL"
        CODE_SIGN_STYLE: Automatic
  PhantasmTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests
    dependencies:
      - target: Phantasm
      - package: PhantasmKit
    info:
      path: Tests/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.phantasm.app.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Phantasm.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Phantasm"
        BUNDLE_LOADER: "$(TEST_HOST)"
schemes:
  Phantasm:
    build:
      targets:
        Phantasm: all
    test:
      targets:
        - PhantasmTests
